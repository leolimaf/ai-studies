<div class="form-container">
  <h2>{{ isEditing ? 'Editar Tarefa' : 'Nova Tarefa' }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Título <span class="required">*</span></label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Título da tarefa"
      />
      <span class="error-message" *ngIf="form.get('title')?.touched && form.get('title')?.hasError('required')">
        Título é obrigatório.
      </span>
      <span class="error-message" *ngIf="form.get('title')?.touched && form.get('title')?.hasError('whitespace')">
        Título não pode conter apenas espaços em branco.
      </span>
    </div>

    <div class="form-group">
      <label for="description">Descrição</label>
      <textarea
        id="description"
        formControlName="description"
        placeholder="Descrição opcional"
        rows="3"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="dueDate">Data de Conclusão <span class="required">*</span></label>
      <input
        id="dueDate"
        type="date"
        formControlName="dueDate"
      />
      <span class="error-message" *ngIf="form.get('dueDate')?.touched && form.get('dueDate')?.hasError('required')">
        Data de conclusão é obrigatória.
      </span>
    </div>

    <div class="form-group">
      <label for="priority">Prioridade <span class="required">*</span></label>
      <select id="priority" formControlName="priority">
        <option *ngFor="let p of priorityOptions" [value]="p.value">{{ p.label }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="status">Status <span class="required">*</span></label>
      <select id="status" formControlName="status">
        <option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
    </div>
  </form>
</div>
